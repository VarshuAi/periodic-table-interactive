<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Periodic Table Grid — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🧪</span>
                <div class="title-col">
                    <h1>Apex Periodic Table Grid</h1>
                    <p class="tagline">Visual chemistry element grids with atomic weight cards.</p>
                </div>
            </div>
            <div class="badge">science</div>
        </header>

        <main class="workspace-card">
            
            <div class="chem-grid">
                <div class="elem" style="background:#1E90FF;" onclick="alert('Hydrogen: Weight 1.008')">H</div>
                <div class="elem" style="background:orange;" onclick="alert('Helium: Weight 4.002')">He</div>
                <div class="elem" style="background:violet;" onclick="alert('Lithium: Weight 6.94')">Li</div>
                <div class="elem" style="background:magenta;" onclick="alert('Beryllium: Weight 9.012')">Be</div>
            </div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
